<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0d1117;
  --card:#161b22;
  --border:#30363d;
  --text:#e6edf3;
  --muted:#8b949e;
  --accent:#4493f8;
  --success:#3fb950;
  --error:#f85149;
}

body {
  background: var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'DM Sans',sans-serif;
  color:var(--text);
}

.card {
  width:400px;
  padding:30px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
}

h2 { margin-bottom:10px; }

input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#0d1117;
  color:white;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

button:hover {
  background:#58a6ff;
}

.otp-box {
  display:flex;
  justify-content:center;
  gap:6px;
  margin:12px 0;
}

.otp-box input {
  width:40px;
  text-align:center;
  font-size:18px;
}

#msg {
  margin-top:10px;
  font-size:13px;
}

.success { color:var(--success); }
.error { color:var(--error); }

.link {
  text-align:center;
  margin-top:12px;
  font-size:13px;
  color:var(--muted);
}
.link a {
  color:var(--accent);
  text-decoration:none;
}
</style>
</head>

<body>

<div class="card">
  <h2>📝 Register with OTP</h2>

  <input type="email" id="email" placeholder="Enter email">
  <input type="password" id="password" placeholder="Enter password">

  <button onclick="sendOtp()">Send OTP</button>

  <div id="otpSection" style="display:none;">
    <div class="otp-box">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
    </div>

    <button onclick="verifyOtp()">Verify & Register</button>
  </div>

  <p id="msg"></p>

  <div class="link">
    Already have account? <a href="index.html">Login</a>
  </div>
</div>

<script>
const msg = document.getElementById("msg");

// ✅ SEND OTP
async function sendOtp() {
  const email = document.getElementById("email").value.trim();

  if (!email) {
    msg.innerText = "⚠️ Email enter பண்ணு";
    msg.className = "error";
    return;
  }

  try {
    const res = await fetch("http://localhost:5000/send-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (data.success) {
      msg.innerText = "✅ OTP sent to email";
      msg.className = "success";
      document.getElementById("otpSection").style.display = "block";
    } else {
      msg.innerText = data.message;
      msg.className = "error";
    }

  } catch {
    msg.innerText = "❌ Server error";
    msg.className = "error";
  }
}

// ✅ VERIFY OTP + REGISTER
async function verifyOtp() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const otp = Array.from(document.querySelectorAll(".otp"))
    .map(i => i.value)
    .join("");

  if (otp.length < 6) {
    msg.innerText = "⚠️ முழு OTP enter பண்ணு";
    msg.className = "error";
    return;
  }

  try {
    // Verify OTP
    const verify = await fetch("http://localhost:5000/verify-otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, otp })
    });

    const vdata = await verify.json();

    if (!vdata.success) {
      msg.innerText = "❌ Wrong OTP";
      msg.className = "error";
      return;
    }

    // Register user
    const reg = await fetch("http://localhost:5000/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const rdata = await reg.json();

    msg.innerText = rdata.message;
    msg.className = rdata.success ? "success" : "error";

  } catch {
    msg.innerText = "❌ Server error";
    msg.className = "error";
  }
}

// 🔥 OTP auto focus
document.querySelectorAll(".otp").forEach((input, i, arr) => {
  input.addEventListener("input", () => {
    if (input.value && i < arr.length - 1) {
      arr[i + 1].focus();
    }
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && i > 0) {
      arr[i - 1].focus();
    }
  });
});
</script>

</body>
</html>
