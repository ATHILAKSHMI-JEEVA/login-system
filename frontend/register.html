<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1117;
  --card:#161b22;
  --border:#30363d;
  --text:#e6edf3;
  --muted:#8b949e;
  --accent:#4493f8;
  --success:#3fb950;
  --error:#f85149;
}
body {
  background: var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'DM Sans',sans-serif;
  color:var(--text);
}
.card {
  width:400px;
  padding:30px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
}
h2 { margin-bottom:10px; }
input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--input-bg);
  color:white;
}
button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}
button:hover { background:#58a6ff; }
.otp-box {
  display:flex;
  justify-content:center;
  gap:6px;
  margin:12px 0;
}
.otp-box input {
  width:40px;
  text-align:center;
  font-size:18px;
}
#msg { margin-top:10px; font-size:13px; }
.success { color:var(--success); }
.error { color:var(--error); }
.link {
  text-align:center;
  margin-top:12px;
  font-size:13px;
  color:var(--muted);
}
.link a { color:var(--accent); text-decoration:none; }
</style>
<link rel="stylesheet" href="theme.css">
<script src="theme.js"></script>
</head>
<body>
<div class="card">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;"><div style="width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--purple,#a371f7));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;"><span data-app-icon>⚖️</span></div><div><div class="app-name" style="font-size:15px;font-weight:600;" data-app-name>Public Rights</div><div style="font-size:11px;color:var(--muted);font-family:monospace;" data-app-tagline>Secure Portal</div></div></div><h2>📝 Register with OTP</h2>
  <input type="email" id="email" placeholder="Enter email">
  <input type="password" id="password" placeholder="Enter password">
  <button onclick="sendOtp()">Send OTP</button>
  <div id="otpSection" style="display:none;">
    <div class="otp-box">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
    </div>
    <button onclick="verifyOtp()">Verify & Register</button>
  </div>
  <p id="msg"></p>
  <div class="link">
    Already have account? <a href="index.html">Login</a>
  </div>
  <div style="display:flex;justify-content:center;margin-top:14px;">
    <button class="theme-toggle" onclick="toggleTheme()">
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span class="toggle-label">Light</span>
    </button>
  </div>
</div>

<script>
const API = "https://login-system-backend-i3b8.onrender.com";
const msg = document.getElementById("msg");

async function sendOtp() {
  const email = document.getElementById("email").value.trim();
  if (!email) {
    msg.innerText = "⚠️ Email enter பண்ணு";
    msg.className = "error";
    return;
  }
  try {
    const res = await fetch(`${API}/send-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (data.success) {
      msg.innerText = "✅ OTP sent to email";
      msg.className = "success";
      document.getElementById("otpSection").style.display = "block";
    } else {
      msg.innerText = data.message;
      msg.className = "error";
    }
  } catch {
    msg.innerText = "❌ Server error";
    msg.className = "error";
  }
}

async function verifyOtp() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const otp = Array.from(document.querySelectorAll(".otp")).map(i => i.value).join("");
  if (otp.length < 6) {
    msg.innerText = "⚠️ முழு OTP enter பண்ணு";
    msg.className = "error";
    return;
  }
  try {
    const verify = await fetch(`${API}/verify-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, otp })
    });
    const vdata = await verify.json();
    if (!vdata.success) {
      msg.innerText = "❌ Wrong OTP";
      msg.className = "error";
      return;
    }
    const reg = await fetch(`${API}/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const rdata = await reg.json();
    msg.innerText = rdata.message;
    msg.className = rdata.success ? "success" : "error";
    if (rdata.message === "Registered successfully") {
      setTimeout(() => window.location.href = "index.html", 1000);
    }
  } catch {
    msg.innerText = "❌ Server error";
    msg.className = "error";
  }
}

document.querySelectorAll(".otp").forEach((input, i, arr) => {
  input.addEventListener("input", () => {
    if (input.value && i < arr.length - 1) arr[i + 1].focus();
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && i > 0) arr[i - 1].focus();
  });
});
</script>
</body>
</html>
