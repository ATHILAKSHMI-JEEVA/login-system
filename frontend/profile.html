<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YourApp — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #06090f;
  --surface: #0c1220;
  --card: #111827;
  --border: #1f2d45;
  --text: #e8f0fe;
  --muted: #4a6080;
  --accent: #4f8ef7;
  --accent2: #00e5a0;
  --danger: #f25c5c;
  --display: 'Syne', sans-serif;
  --body: 'DM Sans', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(79,142,247,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(0,229,160,0.05) 0%, transparent 60%);
}

/* TOPBAR */
#topbar {
  position: sticky; top: 0; z-index: 50;
  height: 58px;
  background: rgba(6,9,15,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 28px; gap: 14px;
}
.logo {
  font-family: var(--display);
  font-size: 18px; font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
}
.logo span { color: var(--text); }
.back-btn {
  margin-left: auto;
  display: flex; align-items: center; gap: 6px;
  padding: 7px 16px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 8px;
  font-family: var(--body);
  font-size: 13px;
  text-decoration: none;
  transition: all 0.2s;
}
.back-btn:hover { border-color: var(--accent); color: var(--accent); }

/* LAYOUT */
.page {
  max-width: 680px;
  margin: 0 auto;
  padding: 40px 20px 60px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* HERO CARD */
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 32px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  position: relative;
  overflow: hidden;
}
.hero-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(135deg, rgba(79,142,247,0.12), rgba(0,229,160,0.08));
}

/* AVATAR */
.avatar-wrap {
  position: relative;
  margin-bottom: 16px;
  z-index: 1;
}
.avatar-ring {
  width: 108px; height: 108px;
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  cursor: pointer;
}
.avatar-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display);
  font-size: 40px; font-weight: 800;
  color: #fff;
  overflow: hidden;
  position: relative;
}
.avatar-inner img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 50%;
}
.avatar-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
  border-radius: 50%;
  display: none;
  align-items: center; justify-content: center;
  font-size: 22px;
}
.avatar-ring:hover .avatar-overlay { display: flex; }
.avatar-edit-badge {
  position: absolute;
  bottom: 4px; right: 4px;
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 50%;
  border: 2px solid var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  cursor: pointer;
}
#avatar-input { display: none; }

.hero-name {
  font-family: var(--display);
  font-size: 24px; font-weight: 800;
  letter-spacing: -0.5px;
  z-index: 1;
}
.hero-email {
  font-size: 13px; color: var(--muted);
  margin-top: 4px; margin-bottom: 20px;
  z-index: 1;
}

/* STATS */
.stats {
  display: flex; gap: 12px;
  width: 100%; z-index: 1;
}
.stat {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  text-align: center;
}
.stat-num {
  font-family: var(--display);
  font-size: 24px; font-weight: 800;
  color: var(--accent);
  line-height: 1;
}
.stat-label {
  font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
  margin-top: 4px;
}

/* SECTION CARD */
.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
}
.section-head {
  font-family: var(--display);
  font-size: 13px; font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.section-head::after {
  content: '';
  flex: 1; height: 1px;
  background: var(--border);
}

/* COLOR PICKER */
.color-grid {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.color-dot {
  width: 40px; height: 40px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
  transition: all 0.2s;
  position: relative;
}
.color-dot:hover { transform: scale(1.12); }
.color-dot.selected {
  border-color: #fff;
  transform: scale(1.12);
  box-shadow: 0 0 0 2px var(--accent);
}
.color-dot.selected::after {
  content: '✓';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff; font-weight: 700;
}
.c0 { background: linear-gradient(135deg,#3b82f6,#8b5cf6); }
.c1 { background: linear-gradient(135deg,#06d6a0,#3b82f6); }
.c2 { background: linear-gradient(135deg,#f59e0b,#ef4444); }
.c3 { background: linear-gradient(135deg,#ec4899,#8b5cf6); }
.c4 { background: linear-gradient(135deg,#10b981,#06d6a0); }
.c5 { background: linear-gradient(135deg,#f97316,#f59e0b); }
.c6 { background: linear-gradient(135deg,#6366f1,#3b82f6); }
.c7 { background: linear-gradient(135deg,#14b8a6,#3b82f6); }

/* FORM */
.form-group { margin-bottom: 16px; }
.form-label {
  font-size: 12px; font-weight: 600;
  color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 8px; display: block;
}
.form-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 14px; font-family: var(--body);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(79,142,247,0.1);
}
.form-input::placeholder { color: var(--muted); }
textarea.form-input { resize: none; height: 90px; line-height: 1.6; }

/* SAVE BUTTON */
.save-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 14px;
  color: #fff;
  font-family: var(--display);
  font-size: 15px; font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: opacity 0.2s, transform 0.15s;
  position: relative;
  overflow: hidden;
}
.save-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.1);
  opacity: 0;
  transition: opacity 0.2s;
}
.save-btn:hover::before { opacity: 1; }
.save-btn:active { transform: scale(0.98); }
.save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* SUCCESS */
.toast {
  position: fixed;
  bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--accent2);
  color: #06090f;
  padding: 12px 24px;
  border-radius: 40px;
  font-weight: 700; font-size: 14px;
  font-family: var(--display);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999;
  display: flex; align-items: center; gap: 8px;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">💬 <span>YourApp</span></div>
  <a href="chat.html" class="back-btn">← Back to Chat</a>
</div>

<div class="page">

  <!-- HERO -->
  <div class="hero-card">
    <div class="avatar-wrap">
      <div class="avatar-ring" onclick="document.getElementById('avatar-input').click()">
        <div class="avatar-inner" id="avatar-inner">
          <span id="avatar-letter">?</span>
          <div class="avatar-overlay">📷</div>
        </div>
      </div>
      <div class="avatar-edit-badge" onclick="document.getElementById('avatar-input').click()">✏️</div>
    </div>
    <input type="file" id="avatar-input" accept="image/*"/>
    <div class="hero-name" id="hero-name">Loading...</div>
    <div class="hero-email" id="hero-email">-</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="stat-msg">—</div>
        <div class="stat-label">Messages</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-grp">0</div>
        <div class="stat-label">Groups</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-since">—</div>
        <div class="stat-label">Member Since</div>
      </div>
    </div>
  </div>

  <!-- COLOR -->
  <div class="section-card">
    <div class="section-head">🎨 Avatar Color</div>
    <div class="color-grid" id="color-grid"></div>
  </div>

  <!-- EDIT -->
  <div class="section-card">
    <div class="section-head">✏️ Edit Profile</div>
    <div class="form-group">
      <label class="form-label">Display Name</label>
      <input type="text" id="name-input" class="form-input" placeholder="Your name..."/>
    </div>
    <div class="form-group" style="margin-bottom:24px;">
      <label class="form-label">Bio</label>
      <textarea id="bio-input" class="form-input" placeholder="Tell something about yourself..."></textarea>
    </div>
    <button class="save-btn" id="save-btn" onclick="saveProfile()">💾 Save Changes</button>
  </div>

</div>

<div class="toast" id="toast">✅ Profile saved!</div>

<script>
const SERVER  = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:5000'
  : 'https://login-system-backend-i3b8.onrender.com';

const myEmail = localStorage.getItem('email');
const token   = localStorage.getItem('token');
if (!myEmail) window.location.href = 'index.html';

document.getElementById('hero-email').textContent = myEmail || '';

let selectedColor = 'av0';
let newAvatarFile = null;

const colorMap = {
  av0: 'linear-gradient(135deg,#3b82f6,#8b5cf6)',
  av1: 'linear-gradient(135deg,#06d6a0,#3b82f6)',
  av2: 'linear-gradient(135deg,#f59e0b,#ef4444)',
  av3: 'linear-gradient(135deg,#ec4899,#8b5cf6)',
  av4: 'linear-gradient(135deg,#10b981,#06d6a0)',
  av5: 'linear-gradient(135deg,#f97316,#f59e0b)',
  av6: 'linear-gradient(135deg,#6366f1,#3b82f6)',
  av7: 'linear-gradient(135deg,#14b8a6,#3b82f6)'
};

// Build color grid
var grid = document.getElementById('color-grid');
for (var i = 0; i < 8; i++) {
  (function(idx) {
    var dot = document.createElement('div');
    dot.className = 'color-dot c' + idx + (idx === 0 ? ' selected' : '');
    dot.dataset.color = 'av' + idx;
    dot.onclick = function() {
      document.querySelectorAll('.color-dot').forEach(function(d) { d.classList.remove('selected'); });
      dot.classList.add('selected');
      selectedColor = 'av' + idx;
      if (!newAvatarFile && !document.getElementById('avatar-inner').querySelector('img')) {
        document.getElementById('avatar-inner').style.background = colorMap[selectedColor];
      }
    };
    grid.appendChild(dot);
  })(i);
}

// Avatar image preview
document.getElementById('avatar-input').onchange = function() {
  var file = this.files[0];
  if (!file) return;
  newAvatarFile = file;
  var reader = new FileReader();
  reader.onload = function(e) {
    var inner = document.getElementById('avatar-inner');
    inner.innerHTML = '<img src="' + e.target.result + '" alt="avatar"/><div class="avatar-overlay">📷</div>';
  };
  reader.readAsDataURL(file);
};

// Load profile
async function loadProfile() {
  try {
    var res  = await fetch(SERVER + '/profile/' + encodeURIComponent(myEmail));
    var data = await res.json();

    if (data.success) {
      var p = data.profile;
      var name = p.name || myEmail.split('@')[0];
      document.getElementById('hero-name').textContent  = name;
      document.getElementById('name-input').value       = p.name || '';
      document.getElementById('bio-input').value        = p.bio  || '';

      if (p.avatar_url) {
        var inner = document.getElementById('avatar-inner');
        inner.innerHTML = '<img src="' + p.avatar_url + '" alt="avatar"/><div class="avatar-overlay">📷</div>';
      } else {
        selectedColor = p.avatar_color || 'av0';
        document.getElementById('avatar-inner').style.background = colorMap[selectedColor];
        document.getElementById('avatar-letter').textContent = myEmail[0].toUpperCase();
        var idx = parseInt(selectedColor.replace('av',''));
        document.querySelectorAll('.color-dot').forEach(function(d, i) {
          d.classList.toggle('selected', i === idx);
        });
      }
    } else {
      document.getElementById('avatar-inner').style.background = colorMap['av0'];
      document.getElementById('avatar-letter').textContent = myEmail[0].toUpperCase();
      document.getElementById('hero-name').textContent = myEmail.split('@')[0];
    }
  } catch(e) {
    document.getElementById('avatar-inner').style.background = colorMap['av0'];
    document.getElementById('avatar-letter').textContent = myEmail[0].toUpperCase();
    document.getElementById('hero-name').textContent = myEmail.split('@')[0];
  }

  // Stats
  try {
    var r2 = await fetch(SERVER + '/groups/' + encodeURIComponent(myEmail));
    var d2 = await r2.json();
    document.getElementById('stat-grp').textContent = d2.success ? d2.groups.length : 0;
  } catch(e) {}

  document.getElementById('stat-msg').textContent = '✓';
  document.getElementById('stat-since').textContent = 'May';
}

// Save
async function saveProfile() {
  var btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  var formData = new FormData();
  formData.append('email', myEmail);
  formData.append('name',  document.getElementById('name-input').value.trim());
  formData.append('bio',   document.getElementById('bio-input').value.trim());
  formData.append('avatar_color', selectedColor);
  if (newAvatarFile) formData.append('avatar', newAvatarFile);

  try {
    var res  = await fetch(SERVER + '/profile', { method: 'POST', body: formData });
    var data = await res.json();
    if (data.success) {
      var name = document.getElementById('name-input').value.trim();
      document.getElementById('hero-name').textContent = name || myEmail.split('@')[0];
      if (name) localStorage.setItem('userName', name);
      showToast();
    }
  } catch(e) { alert('Save failed!'); }

  btn.disabled = false;
  btn.textContent = '💾 Save Changes';
}

function showToast() {
  var t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

loadProfile();
</script>
</body>
</html>
