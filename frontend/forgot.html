<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<style>
body {
  background:var(--input-bg);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
  font-family:sans-serif;
}
.card {
  width:380px;
  padding:25px;
  background:#161b22;
  border-radius:10px;
}
input, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:none;
}
input {
  background:var(--input-bg);
  border:1px solid #30363d;
  color:white;
}
button {
  background:#4493f8;
  color:white;
  cursor:pointer;
}
.otp-box {
  display:flex;
  gap:5px;
  justify-content:center;
}
.otp-box input { width:40px; text-align:center; }
#msg { margin-top:10px; }
.success { color:#3fb950; }
.error { color:#f85149; }
</style>
<link rel="stylesheet" href="theme.css">
<script src="theme.js"></script>
</head>
<body>
<div class="card">
  <h2>🔑 Reset Password</h2>
  <input type="email" id="email" placeholder="Enter email">
  <button onclick="sendOtp()">Send OTP</button>
  <div id="otpSection" style="display:none;">
    <div class="otp-box">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
      <input maxlength="1" class="otp">
    </div>
    <input type="password" id="newPassword" placeholder="New password">
    <button onclick="resetPassword()">Reset Password</button>
  </div>
  <p id="msg"></p>
</div>

<script>
const API = "https://login-system-backend-i3b8.onrender.com";
const msg = document.getElementById("msg");

async function sendOtp() {
  const email = document.getElementById("email").value;
  try {
    const res = await fetch(`${API}/send-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (data.success) {
      msg.innerText = "✅ OTP sent to email";
      msg.className = "success";
      document.getElementById("otpSection").style.display = "block";
    } else {
      msg.innerText = data.message;
      msg.className = "error";
    }
  } catch {
    msg.innerText = "❌ Server error";
    msg.className = "error";
  }
}

async function resetPassword() {
  const email = document.getElementById("email").value;
  const newPassword = document.getElementById("newPassword").value;
  const otp = Array.from(document.querySelectorAll(".otp")).map(i => i.value).join('');
  try {
    const res = await fetch(`${API}/reset-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, otp, newPassword })
    });
    const data = await res.json();
    msg.innerText = data.message;
    msg.className = data.success ? "success" : "error";
    if (data.success) {
      setTimeout(() => window.location.href = "index.html", 1500);
    }
  } catch {
    msg.innerText = "❌ Server error";
    msg.className = "error";
  }
}

document.querySelectorAll(".otp").forEach((input, i, arr) => {
  input.addEventListener("input", () => {
    if (input.value && i < arr.length - 1) arr[i + 1].focus();
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && i > 0) arr[i - 1].focus();
  });
});
</script>
</body>
</html>
