<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YourApp — Chat</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#070b11; --surface:#0e1521; --card:#131d2e; --border:#1e2d45;
  --text:#e2eaf5; --muted:#5a7394; --accent:#3b82f6; --accent2:#06d6a0;
  --online:#06d6a0; --me-msg:#1d3e72; --them-msg:#131d2e;
  --danger:#ef4444; --font:'Plus Jakarta Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;flex-direction:column;}

#topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;}
.logo{font-size:17px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px;}
.logo span{color:var(--text);}
#topbar-user{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);margin-left:auto;}
#topbar-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;overflow:hidden;flex-shrink:0;}
#topbar-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
#topbar-name{font-size:13px;color:var(--text);font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:var(--font);}
#logout-btn:hover{border-color:var(--danger);color:var(--danger);}

#main{flex:1;display:flex;overflow:hidden;}

#left-panel{width:300px;min-width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#panel-header{padding:16px 16px 10px;border-bottom:1px solid var(--border);}
#panel-header h2{font-size:17px;font-weight:700;}
#panel-header p{font-size:11px;color:var(--muted);margin-top:2px;}
#search-wrap{padding:10px 12px;border-bottom:1px solid var(--border);}
#search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;}
#search-input:focus{border-color:var(--accent);}
#search-input::placeholder{color:var(--muted);}
#tab-bar{display:flex;padding:6px 12px 0;gap:4px;border-bottom:1px solid var(--border);}
.tab-btn{padding:6px 12px;font-size:12px;font-weight:600;font-family:var(--font);border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

.section-label{padding:8px 14px 4px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;}
#sidebar-scroll{flex:1;overflow-y:auto;}
#sidebar-scroll::-webkit-scrollbar{width:3px;}
#sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.create-group-btn{margin:4px 10px 6px;padding:8px 12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;width:calc(100% - 20px);text-align:left;display:flex;align-items:center;gap:8px;}
.create-group-btn:hover{opacity:0.85;}

.user-card,.group-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:background 0.15s;margin:1px 6px;}
.user-card:hover,.group-card:hover{background:var(--card);}
.user-card.active,.group-card.active{background:#162038;}
.avatar-wrap{position:relative;flex-shrink:0;}
.card-avatar{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;overflow:hidden;}
.card-avatar img{width:100%;height:100%;object-fit:cover;border-radius:13px;}
.group-avatar{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#f59e0b,#ef4444);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.status-dot{position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;border-radius:50%;border:2px solid var(--surface);background:#374151;}
.status-dot.online{background:var(--online);}
.card-info{flex:1;overflow:hidden;}
.card-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.card-sub.online-text{color:var(--online);}
.unread-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 5px;}

#right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);}
.empty-icon{width:68px;height:68px;background:var(--card);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;border:1px solid var(--border);}
#empty-state h3{font-size:16px;color:var(--text);}

#chat-view{flex:1;display:none;flex-direction:column;overflow:hidden;}
#chat-topbar{padding:10px 18px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px;}
#ct-avatar{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;overflow:hidden;flex-shrink:0;}
#ct-avatar img{width:100%;height:100%;object-fit:cover;border-radius:11px;}
#ct-name{font-size:14px;font-weight:700;}
#ct-status{font-size:11px;color:var(--muted);}
#ct-status.online{color:var(--online);}
#typing-indicator{font-size:11px;color:var(--accent);display:none;font-style:italic;}

#messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px;}
#messages-area::-webkit-scrollbar{width:3px;}
#messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.msg-group{display:flex;flex-direction:column;max-width:65%;gap:2px;position:relative;}
.msg-group.me{align-self:flex-end;align-items:flex-end;}
.msg-group.them{align-self:flex-start;align-items:flex-start;}
.bubble{padding:9px 13px;border-radius:16px;font-size:13.5px;line-height:1.5;word-break:break-word;}
.me .bubble{background:var(--me-msg);border-bottom-right-radius:4px;color:#c8ddff;}
.them .bubble{background:var(--them-msg);border-bottom-left-radius:4px;border:1px solid var(--border);color:var(--text);}
.msg-time{font-size:10px;color:var(--muted);margin:0 4px;}
.tick{font-size:12px;color:var(--muted);margin-left:4px;}
.tick.seen{color:#4493f8;}
.day-label{align-self:center;font-size:11px;color:var(--muted);background:var(--card);border:1px solid var(--border);padding:3px 12px;border-radius:20px;margin:10px 0;}
.no-msgs{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px;}
.sender-name{font-size:11px;color:var(--accent);margin-bottom:2px;}

.img-bubble{max-width:220px;border-radius:12px;cursor:pointer;display:block;}
.video-bubble{max-width:240px;border-radius:12px;outline:none;}
.audio-bubble{width:220px;height:36px;border-radius:20px;accent-color:var(--accent);}
.file-bubble{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:8px 12px;text-decoration:none;color:var(--text);font-size:13px;min-width:150px;}
.file-icon{font-size:20px;}

/* ── Deleted message style ── */
.deleted-bubble{padding:9px 13px;border-radius:16px;font-size:12px;font-style:italic;color:var(--muted);border:1px dashed var(--border);background:transparent;}

/* ── Context Menu ── */
#ctx-menu{
  position:fixed;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:4px;
  z-index:9999;
  display:none;
  min-width:160px;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.ctx-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:7px;
  font-size:13px;cursor:pointer;color:var(--text);
}
.ctx-item:hover{background:var(--card);}
.ctx-item.danger{color:var(--danger);}
.ctx-item.danger:hover{background:rgba(239,68,68,0.1);}

#input-row{padding:10px 14px;border-top:1px solid var(--border);background:var(--surface);display:flex;align-items:flex-end;gap:8px;position:relative;}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.icon-btn:hover{background:var(--border);}
#msg-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 14px;color:var(--text);font-size:13.5px;font-family:var(--font);outline:none;resize:none;max-height:100px;line-height:1.5;}
#msg-input:focus{border-color:var(--accent);}
#msg-input::placeholder{color:var(--muted);}
#send-btn{width:40px;height:40px;border-radius:11px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#send-btn:hover{background:#2563eb;}
#send-btn svg{width:17px;height:17px;fill:#fff;}
#file-input{display:none;}
#img-file-input{display:none;}
#video-file-input{display:none;}
#doc-file-input{display:none;}

/* ── Attachment menu ── */
#attach-menu{
  position:absolute;bottom:62px;left:14px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:6px;display:none;
  flex-direction:column;gap:2px;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:50;min-width:170px;
}
#attach-menu.show{display:flex;}
.attach-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;color:var(--text);}
.attach-item:hover{background:var(--card);}
.attach-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}

/* ── Voice recording UI ── */
#voice-btn{
  width:40px;height:40px;border-radius:11px;
  background:var(--card);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;user-select:none;transition:all 0.15s;color:var(--muted);
}
#voice-btn:hover{background:var(--border);color:var(--text);}
#voice-btn.recording{
  background:var(--danger);border-color:var(--danger);color:#fff;
  animation:pulse-rec 1s infinite;
}
@keyframes pulse-rec{
  0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.5);}
  50%{box-shadow:0 0 0 8px rgba(239,68,68,0);}
}
#rec-bar{
  display:none;align-items:center;gap:8px;
  background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);
  border-radius:12px;padding:6px 12px;flex:1;
}
#rec-bar.show{display:flex;}
#rec-timer{font-size:13px;font-weight:600;color:var(--danger);min-width:38px;}
#rec-wave{flex:1;height:28px;}
#rec-cancel{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px 4px;}
#rec-cancel:hover{color:var(--danger);}

#img-preview-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;align-items:center;justify-content:center;}
#img-preview-overlay img{max-width:90vw;max-height:90vh;border-radius:8px;}
#img-preview-overlay.show{display:flex;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:380px;max-width:90vw;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;}
.modal-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;margin-bottom:12px;}
.modal-input:focus{border-color:var(--accent);}
.members-list{max-height:200px;overflow-y:auto;margin-bottom:12px;}
.member-check{display:flex;align-items:center;gap:10px;padding:7px 4px;cursor:pointer;border-radius:8px;font-size:13px;}
.member-check:hover{background:var(--card);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn-cancel{padding:8px 16px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:13px;font-family:var(--font);cursor:pointer;}
.btn-create{padding:8px 16px;border-radius:8px;background:var(--accent);border:none;color:#fff;font-size:13px;font-family:var(--font);cursor:pointer;font-weight:600;}

#login-wall{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:18px;}
#login-wall a{padding:11px 26px;background:var(--accent);color:#fff;border-radius:10px;text-decoration:none;font-weight:700;}

.av0{background:linear-gradient(135deg,#3b82f6,#8b5cf6);}
.av1{background:linear-gradient(135deg,#06d6a0,#3b82f6);}
.av2{background:linear-gradient(135deg,#f59e0b,#ef4444);}
.av3{background:linear-gradient(135deg,#ec4899,#8b5cf6);}
.av4{background:linear-gradient(135deg,#10b981,#06d6a0);}
.av5{background:linear-gradient(135deg,#f97316,#f59e0b);}
.av6{background:linear-gradient(135deg,#6366f1,#3b82f6);}
.av7{background:linear-gradient(135deg,#14b8a6,#3b82f6);}
</style>
</head>
<body>

<div id="login-wall" style="display:none;">
  <div style="font-size:44px;">🔐</div>
  <h2>Login பண்ணணும்!</h2>
  <a href="index.html">← Login Page</a>
</div>

<!-- ── Context Menu ── -->
<div id="ctx-menu">
  <div class="ctx-item" id="ctx-copy" onclick="ctxCopy()">📋 Copy</div>
  <div class="ctx-item danger" id="ctx-delete-me" onclick="ctxDeleteForMe()">🗑️ Delete for Me</div>
  <div class="ctx-item danger" id="ctx-delete-all" onclick="ctxDeleteForEveryone()" style="display:none;">🗑️ Delete for Everyone</div>
</div>

<div id="topbar">
  <div class="logo">💬 <span>YourApp</span></div>
  <div id="topbar-user">
    <div id="topbar-avatar">?</div>
    <span id="topbar-name">-</span>
    <a href="profile.html" style="padding:5px 12px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;border-radius:6px;text-decoration:none;">👤 Profile</a>
    <button id="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div id="main">
  <div id="left-panel">
    <div id="panel-header">
      <h2>Messages</h2>
      <p id="online-count">Loading...</p>
    </div>
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="🔍 Search users..."/>
    </div>
    <div id="tab-bar">
      <button class="tab-btn active" onclick="setTab('all',this)">All</button>
      <button class="tab-btn" onclick="setTab('online',this)">Online</button>
      <button class="tab-btn" onclick="setTab('groups',this)">Groups</button>
    </div>
    <div id="sidebar-scroll">
      <div id="dm-section">
        <div id="users-list"></div>
      </div>
      <div id="groups-section" style="display:none;">
        <button class="create-group-btn" onclick="openCreateGroup()">➕ Create New Group</button>
        <div id="groups-list"></div>
      </div>
    </div>
  </div>

  <div id="right-panel">
    <div id="empty-state">
      <div class="empty-icon">💬</div>
      <h3>Who do you want to chat with?</h3>
      <p>Select a user from the left</p>
    </div>
    <div id="chat-view">
      <div id="chat-topbar">
        <div id="ct-avatar" class="av0">?</div>
        <div style="flex:1;">
          <div id="ct-name">-</div>
          <div id="ct-status">-</div>
          <div id="typing-indicator">typing...</div>
        </div>
        <div id="group-actions" style="display:none;">
          <button class="icon-btn" onclick="openGroupInfo()" title="Group Info" style="font-size:14px;">👥</button>
        </div>
      </div>
      <div id="group-info-panel" style="display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 18px;">
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600;">MEMBERS</div>
        <div id="group-members-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;"></div>
        <button onclick="openAddMembers()" style="background:var(--accent);border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font);font-weight:600;">➕ Add Members</button>
        <button onclick="leaveGroup()" style="background:transparent;border:1px solid var(--danger);color:var(--danger);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font);margin-left:8px;">🚪 Leave Group</button>
      </div>
      <div id="messages-area"></div>
      <div id="input-row">
        <input type="file" id="img-file-input"   accept="image/*"/>
        <input type="file" id="video-file-input" accept="video/*"/>
        <input type="file" id="doc-file-input"   accept=".pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx,.zip,.rar"/>
        <input type="file" id="file-input"        accept="*/*"/>
        <div id="attach-menu">
          <div class="attach-item" onclick="triggerFile('img-file-input')">
            <div class="attach-icon" style="background:rgba(59,130,246,0.15);">🖼️</div><span>Image</span>
          </div>
          <div class="attach-item" onclick="triggerFile('video-file-input')">
            <div class="attach-icon" style="background:rgba(239,68,68,0.15);">🎬</div><span>Video</span>
          </div>
          <div class="attach-item" onclick="triggerFile('doc-file-input')">
            <div class="attach-icon" style="background:rgba(245,158,11,0.15);">📄</div><span>Document</span>
          </div>
          <div class="attach-item" onclick="triggerFile('file-input')">
            <div class="attach-icon" style="background:rgba(6,214,160,0.15);">📁</div><span>Any File</span>
          </div>
        </div>
        <button class="icon-btn" id="attach-btn" onclick="toggleAttachMenu(event)" title="Attach">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted);">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <div id="rec-bar">
          <span style="font-size:16px;">🔴</span>
          <span id="rec-timer">0:00</span>
          <canvas id="rec-wave" width="180" height="28"></canvas>
          <button id="rec-cancel" onclick="cancelRecording()" title="Cancel">✕</button>
        </div>
        <textarea id="msg-input" rows="1" placeholder="Type a message..."></textarea>
        <button id="voice-btn" title="Hold to record"
          onmousedown="startRecording()" onmouseup="stopRecording()" onmouseleave="stopRecording()"
          ontouchstart="startRecording(event)" ontouchend="stopRecording()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="9" y1="22" x2="15" y2="22"/>
          </svg>
        </button>
        <button id="send-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="img-preview-overlay" onclick="this.classList.remove('show')">
  <img id="preview-img" src="" alt="preview"/>
</div>

<div class="modal-overlay" id="add-members-modal">
  <div class="modal">
    <h3>➕ Add Members</h3>
    <div class="members-list" id="add-members-checklist"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('add-members-modal').classList.remove('show')">Cancel</button>
      <button class="btn-create" onclick="addMembers()">Add</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="group-modal">
  <div class="modal">
    <h3>➕ Create New Group</h3>
    <input type="text" id="group-name-input" class="modal-input" placeholder="Group name..."/>
    <div class="members-list" id="members-checklist"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeCreateGroup()">Cancel</button>
      <button class="btn-create" onclick="createGroup()">Create</button>
    </div>
  </div>
</div>

<script>
const SERVER = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:5000'
  : 'https://login-system-backend-i3b8.onrender.com';

const token   = localStorage.getItem('token');
const myEmail = localStorage.getItem('email');

if (!token || !myEmail) document.getElementById('login-wall').style.display = 'flex';

var storedName   = localStorage.getItem('userName');
var storedAvatar = localStorage.getItem('userAvatar');
var topbarAv = document.getElementById('topbar-avatar');
var topbarNm = document.getElementById('topbar-name');
topbarNm.textContent = storedName || myEmail || '';
if (storedAvatar) {
  topbarAv.innerHTML = '<img src="' + storedAvatar + '" alt=""/>';
} else {
  topbarAv.textContent = myEmail ? myEmail[0].toUpperCase() : '?';
}

(async function loadMyProfile() {
  try {
    var res  = await fetch(SERVER + '/profile/' + encodeURIComponent(myEmail));
    var data = await res.json();
    if (data.success && data.profile) {
      var p = data.profile;
      var name = p.name || myEmail.split('@')[0];
      topbarNm.textContent = name;
      localStorage.setItem('userName', name);
      if (p.avatar_url) {
        topbarAv.innerHTML = '<img src="' + p.avatar_url + '" alt=""/>';
        localStorage.setItem('userAvatar', p.avatar_url);
      } else {
        topbarAv.textContent = myEmail[0].toUpperCase();
        localStorage.removeItem('userAvatar');
      }
    }
  } catch(e) {}
})();

const socket = io(SERVER, { transports: ['polling'] });
socket.emit('join', myEmail);

let onlineList   = [];
let allUsers     = [];
let myGroups     = [];
let profilesMap  = {};
let currentChat  = null;
let currentGroup = null;
let activeTab    = 'all';
let lastSeenMap  = {};
let unreadMap    = {};
let typingTimer  = null;

// ── Context menu state ──
let ctxMsgId   = null;  // DB id of right-clicked message
let ctxMsgEl   = null;  // DOM element
let ctxMsgText = '';    // plain text (for copy)
let ctxIsMine  = false; // was I the sender?
let ctxIsGroup = false; // group message?

const colorMap = {
  av0:'linear-gradient(135deg,#3b82f6,#8b5cf6)',
  av1:'linear-gradient(135deg,#06d6a0,#3b82f6)',
  av2:'linear-gradient(135deg,#f59e0b,#ef4444)',
  av3:'linear-gradient(135deg,#ec4899,#8b5cf6)',
  av4:'linear-gradient(135deg,#10b981,#06d6a0)',
  av5:'linear-gradient(135deg,#f97316,#f59e0b)',
  av6:'linear-gradient(135deg,#6366f1,#3b82f6)',
  av7:'linear-gradient(135deg,#14b8a6,#3b82f6)'
};

function avClass(email) {
  const c = ['av0','av1','av2','av3','av4','av5','av6','av7'];
  let h = 0;
  for (let ch of email) h = (h * 31 + ch.charCodeAt(0)) % c.length;
  return c[h];
}

function buildAvatar(email, size, radius) {
  size   = size   || 42;
  radius = radius || 13;
  var p  = profilesMap[email];
  var style = 'width:' + size + 'px;height:' + size + 'px;border-radius:' + radius + 'px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:' + Math.round(size * 0.38) + 'px;color:#fff;overflow:hidden;flex-shrink:0;';
  if (p && p.avatar_url) {
    return '<div style="' + style + '"><img src="' + p.avatar_url + '" style="width:100%;height:100%;object-fit:cover;border-radius:' + radius + 'px;" alt=""/></div>';
  }
  var color = p ? (colorMap[p.avatar_color] || colorMap['av0']) : colorMap[avClass(email)];
  var letter = (p && p.name) ? p.name[0].toUpperCase() : email[0].toUpperCase();
  return '<div style="' + style + 'background:' + color + ';">' + letter + '</div>';
}

function getDisplayName(email) {
  var p = profilesMap[email];
  return (p && p.name) ? p.name : email;
}

function formatLastSeen(iso) {
  if (!iso) return 'Last seen: unknown';
  const d = new Date(iso), now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60)    return 'Last seen just now';
  if (diff < 3600)  return 'Last seen ' + Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return 'Last seen ' + Math.floor(diff/3600) + 'h ago';
  return 'Last seen ' + d.toLocaleDateString();
}

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
  const a = document.getElementById('messages-area');
  a.scrollTop = a.scrollHeight;
}

// ─── Socket events ───
socket.on('online-users', function(list) {
  onlineList = list;
  renderUsers();
  if (currentChat) updateChatHeader();
});

socket.on('user-last-seen', function(data) {
  lastSeenMap[data.email] = data.time;
  renderUsers();
  if (currentChat === data.email) updateChatHeader();
});

socket.on('typing', function(data) {
  if (currentChat === data.from) {
    document.getElementById('typing-indicator').style.display = 'block';
    document.getElementById('ct-status').style.display = 'none';
  }
});

socket.on('stop-typing', function(data) {
  if (currentChat === data.from) {
    document.getElementById('typing-indicator').style.display = 'none';
    document.getElementById('ct-status').style.display = 'block';
  }
});

socket.on('msg-seen', function(data) {
  document.querySelectorAll('.tick').forEach(function(t) {
    t.textContent = '✓✓';
    t.classList.add('seen');
  });
});

socket.on('private-message', function(data) {
  if (currentChat === data.from) {
    appendBubble(data.id, data.message, 'them', data.time, data.type, data.fileUrl, data.fileName);
  } else {
    unreadMap[data.from] = (unreadMap[data.from] || 0) + 1;
    renderUsers();
  }
});

socket.on('group-message', function(data) {
  if (currentGroup && currentGroup.id === data.groupId) {
    appendGroupBubble(data.id, data.from, data.message, data.from === myEmail ? 'me' : 'them', data.time, data.type, data.fileUrl, data.fileName);
  }
});

// ── DELETE FOR EVERYONE (received) ──
socket.on('message-deleted', function(data) {
  // data: { msgId, deletedFor }  ('everyone' or myEmail)
  var el = document.querySelector('[data-msg-id="' + data.msgId + '"]');
  if (el) {
    if (data.deletedFor === 'everyone') {
      markDeletedUI(el, true);
    } else if (data.deletedFor === myEmail) {
      el.remove();
    }
  }
});

// ─── Load ───
async function loadProfiles() {
  try {
    var res  = await fetch(SERVER + '/profiles');
    var data = await res.json();
    if (data.success) {
      data.profiles.forEach(function(p) { profilesMap[p.email] = p; });
    }
  } catch(e) {}
}

async function loadUsers() {
  try {
    const res  = await fetch(SERVER + '/users');
    const data = await res.json();
    if (data.success) {
      allUsers = data.users.filter(function(u) { return u !== myEmail; });
      renderUsers();
    }
  } catch(e) {}
}

async function loadGroups() {
  try {
    const res  = await fetch(SERVER + '/groups/' + encodeURIComponent(myEmail));
    const data = await res.json();
    if (data.success) {
      myGroups = data.groups;
      renderGroups();
    }
  } catch(e) {}
}

function renderUsers() {
  const list = document.getElementById('users-list');
  const q    = document.getElementById('search-input').value.toLowerCase();
  let users = allUsers.filter(function(u) { return u.toLowerCase().includes(q) || getDisplayName(u).toLowerCase().includes(q); });
  if (activeTab === 'online') users = users.filter(function(u) { return onlineList.includes(u); });
  const onlineCnt = allUsers.filter(function(u) { return onlineList.includes(u); }).length;
  document.getElementById('online-count').textContent = allUsers.length + ' users · ' + onlineCnt + ' online';
  list.innerHTML = '';
  if (!users.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:16px;">No users found</div>';
    return;
  }
  users.forEach(function(email) {
    const isOnline   = onlineList.includes(email);
    const unread     = unreadMap[email] || 0;
    const sub        = isOnline ? 'Online now' : formatLastSeen(lastSeenMap[email]);
    const displayName = getDisplayName(email);
    const card = document.createElement('div');
    card.className = 'user-card' + (currentChat === email ? ' active' : '');
    card.innerHTML =
      '<div class="avatar-wrap">' +
        buildAvatar(email, 42, 13) +
        '<div class="status-dot ' + (isOnline ? 'online' : '') + '"></div>' +
      '</div>' +
      '<div class="card-info">' +
        '<div class="card-name">' + escHtml(displayName) + '</div>' +
        '<div class="card-sub ' + (isOnline ? 'online-text' : '') + '">' + (isOnline ? '🟢 ' : '') + sub + '</div>' +
      '</div>' +
      '<div class="unread-badge" style="' + (unread > 0 ? 'display:flex' : 'display:none') + '">' + unread + '</div>';
    card.onclick = function() { openChat(email); };
    list.appendChild(card);
  });
}

function renderGroups() {
  const list = document.getElementById('groups-list');
  list.innerHTML = '';
  if (!myGroups.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:10px;">No groups yet</div>';
    return;
  }
  myGroups.forEach(function(g) {
    const card = document.createElement('div');
    card.className = 'group-card' + (currentGroup && currentGroup.id === g.id ? ' active' : '');
    card.innerHTML =
      '<div class="group-avatar">👥</div>' +
      '<div class="card-info">' +
        '<div class="card-name">' + escHtml(g.name) + '</div>' +
        '<div class="card-sub">Group Chat</div>' +
      '</div>';
    card.onclick = function() { openGroupChat(g); };
    list.appendChild(card);
  });
}

function setTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  if (tab === 'groups') {
    document.getElementById('dm-section').style.display = 'none';
    document.getElementById('groups-section').style.display = 'block';
    renderGroups();
  } else {
    document.getElementById('dm-section').style.display = 'block';
    document.getElementById('groups-section').style.display = 'none';
    renderUsers();
  }
}

document.getElementById('search-input').oninput = function() { renderUsers(); };

async function openChat(email) {
  currentChat  = email;
  currentGroup = null;
  unreadMap[email] = 0;
  renderUsers();
  renderGroups();
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-view').style.display   = 'flex';
  updateChatHeader();
  socket.emit('msg-seen', { to: email, from: myEmail });
  showGroupActions(false);

  const res  = await fetch(SERVER + '/messages/' + encodeURIComponent(myEmail) + '/' + encodeURIComponent(email), { headers: { authorization: token } });
  const data = await res.json();
  const area = document.getElementById('messages-area');
  area.innerHTML = '';

  if (data.success && data.messages.length > 0) {
    var lastDay = '';
    data.messages.forEach(function(m) {
      var day = new Date(m.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      if (day !== lastDay) {
        var lbl = document.createElement('div');
        lbl.className = 'day-label';
        lbl.textContent = day;
        area.appendChild(lbl);
        lastDay = day;
      }
      appendBubble(m.id, m.message, m.sender === myEmail ? 'me' : 'them', m.created_at, m.type, m.file_url, m.file_name, m.deleted_for_everyone, m.deleted_for);
    });
  } else {
    area.innerHTML = '<div class="no-msgs"><span style="font-size:28px">👋</span><span>Say hi to ' + escHtml(getDisplayName(email)) + '!</span></div>';
  }
  scrollBottom();
}

function updateChatHeader() {
  var email    = currentChat;
  var isOnline = onlineList.includes(email);
  var p        = profilesMap[email];
  var ctAv     = document.getElementById('ct-avatar');
  var name     = getDisplayName(email);
  if (p && p.avatar_url) {
    ctAv.innerHTML = '<img src="' + p.avatar_url + '" alt=""/>';
    ctAv.className = '';
    ctAv.style.background = 'transparent';
  } else {
    var color = p ? (colorMap[p.avatar_color] || colorMap['av0']) : colorMap[avClass(email)];
    ctAv.textContent = name[0].toUpperCase();
    ctAv.className   = '';
    ctAv.style.background = color;
  }
  document.getElementById('ct-name').textContent = name;
  var st = document.getElementById('ct-status');
  st.textContent = isOnline ? '🟢 Online now' : formatLastSeen(lastSeenMap[email]);
  st.className   = isOnline ? 'online' : '';
}

async function openGroupChat(group) {
  currentGroup = group;
  currentChat  = null;
  renderUsers();
  renderGroups();
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-view').style.display   = 'flex';
  var ctAv = document.getElementById('ct-avatar');
  ctAv.textContent     = '👥';
  ctAv.className       = '';
  ctAv.style.background = 'linear-gradient(135deg,#f59e0b,#ef4444)';
  document.getElementById('ct-name').textContent   = group.name;
  document.getElementById('ct-status').textContent = 'Group Chat';
  document.getElementById('ct-status').className   = '';
  socket.emit('join-group', group.id);
  showGroupActions(true);

  const res  = await fetch(SERVER + '/group-messages/' + group.id);
  const data = await res.json();
  var area   = document.getElementById('messages-area');
  area.innerHTML = '';
  if (data.success && data.messages.length > 0) {
    data.messages.forEach(function(m) {
      appendGroupBubble(m.id, m.sender, m.message, m.sender === myEmail ? 'me' : 'them', m.created_at, m.type, m.file_url, m.file_name, m.deleted_for_everyone);
    });
  } else {
    area.innerHTML = '<div class="no-msgs"><span style="font-size:28px">👥</span><span>Start the group conversation!</span></div>';
  }
  scrollBottom();
}

// ── Append helpers ──
function appendBubble(id, text, who, time, type, fileUrl, fileName, deletedForEveryone, deletedFor) {
  type = type || 'text';
  var area  = document.getElementById('messages-area');
  var noMsg = area.querySelector('.no-msgs');
  if (noMsg) noMsg.remove();

  var group   = document.createElement('div');
  group.className = 'msg-group ' + who;
  if (id) group.dataset.msgId = id;
  group.dataset.msgType  = 'dm';
  group.dataset.isMine   = (who === 'me') ? '1' : '0';
  group.dataset.msgText  = text || '';

  var t    = time ? new Date(time).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';
  var tick = who === 'me' ? '<span class="tick">✓</span>' : '';

  // Already deleted?
  var isDeletedEveryone = deletedForEveryone == 1 || deletedForEveryone === true;
  var isDeletedForMe    = deletedFor && deletedFor.split(',').includes(myEmail);

  if (isDeletedForMe && !isDeletedEveryone) {
    // Don't show at all
    return;
  }

  var content = isDeletedEveryone
    ? '<div class="deleted-bubble">🚫 This message was deleted</div>'
    : buildContent(text, type, fileUrl, fileName);

  group.innerHTML = content + '<div class="msg-time">' + t + tick + '</div>';

  // Right-click → context menu (only on non-deleted bubbles)
  if (!isDeletedEveryone) {
    group.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      showCtxMenu(e, id, group, text, who === 'me', false);
    });
  }

  area.appendChild(group);
  scrollBottom();
}

function appendGroupBubble(id, sender, text, who, time, type, fileUrl, fileName, deletedForEveryone) {
  type = type || 'text';
  var area  = document.getElementById('messages-area');
  var noMsg = area.querySelector('.no-msgs');
  if (noMsg) noMsg.remove();

  var group = document.createElement('div');
  group.className = 'msg-group ' + who;
  if (id) group.dataset.msgId = id;
  group.dataset.msgType = 'group';
  group.dataset.isMine  = (who === 'me') ? '1' : '0';
  group.dataset.msgText = text || '';

  var t     = time ? new Date(time).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';
  var senderLabel = who === 'them'
    ? '<div class="sender-name">' + escHtml(getDisplayName(sender)) + '</div>'
    : '';

  var isDeleted = deletedForEveryone == 1 || deletedForEveryone === true;
  var content = isDeleted
    ? '<div class="deleted-bubble">🚫 This message was deleted</div>'
    : buildContent(text, type, fileUrl, fileName);

  group.innerHTML = senderLabel + content + '<div class="msg-time">' + t + '</div>';

  if (!isDeleted) {
    group.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      showCtxMenu(e, id, group, text, who === 'me', true);
    });
  }

  area.appendChild(group);
  scrollBottom();
}

function buildContent(text, type, fileUrl, fileName) {
  if (type === 'image' && fileUrl)
    return '<img class="img-bubble" src="' + fileUrl + '" alt="image" onclick="previewImg(this.src)"/>';
  if (type === 'video' && fileUrl)
    return '<video class="video-bubble" controls src="' + fileUrl + '"></video>';
  if (type === 'audio' && fileUrl)
    return '<audio class="audio-bubble" controls src="' + fileUrl + '"></audio>';
  if (type === 'file' && fileUrl)
    return '<a class="file-bubble" href="' + fileUrl + '" target="_blank" download="' + (fileName || 'file') + '"><span class="file-icon">📄</span><span>' + escHtml(fileName || 'Download') + '</span></a>';
  return '<div class="bubble">' + escHtml(text || '') + '</div>';
}

function previewImg(src) {
  document.getElementById('preview-img').src = src;
  document.getElementById('img-preview-overlay').classList.add('show');
}

// ─────────────────────────────────────────
//  CONTEXT MENU LOGIC
// ─────────────────────────────────────────
function showCtxMenu(e, msgId, el, text, isMine, isGroup) {
  ctxMsgId   = msgId;
  ctxMsgEl   = el;
  ctxMsgText = text;
  ctxIsMine  = isMine;
  ctxIsGroup = isGroup;

  var menu = document.getElementById('ctx-menu');

  // "Delete for Everyone" — only sender can use
  document.getElementById('ctx-delete-all').style.display = isMine ? 'flex' : 'none';

  // Position menu
  menu.style.display = 'block';
  var mx = e.clientX, my = e.clientY;
  if (mx + 170 > window.innerWidth)  mx = window.innerWidth - 175;
  if (my + 130 > window.innerHeight) my = window.innerHeight - 135;
  menu.style.left = mx + 'px';
  menu.style.top  = my + 'px';
}

// Hide menu on outside click
document.addEventListener('click', function() {
  document.getElementById('ctx-menu').style.display = 'none';
});

function ctxCopy() {
  if (ctxMsgText) navigator.clipboard.writeText(ctxMsgText).catch(function(){});
}

async function ctxDeleteForMe() {
  if (!ctxMsgId || !ctxMsgEl) return;
  try {
    var res  = await fetch(SERVER + '/messages/' + ctxMsgId + '/delete-for-me', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', authorization: token },
      body: JSON.stringify({ email: myEmail })
    });
    var data = await res.json();
    if (data.success) {
      ctxMsgEl.remove();
    } else {
      alert('Could not delete message');
    }
  } catch(e) { alert('Error: ' + e.message); }
}

async function ctxDeleteForEveryone() {
  if (!ctxMsgId || !ctxMsgEl) return;
  var endpoint = ctxIsGroup
    ? SERVER + '/group-messages/' + ctxMsgId + '/delete'
    : SERVER + '/messages/' + ctxMsgId + '/delete-for-everyone';

  try {
    var res  = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', authorization: token },
      body: JSON.stringify({ email: myEmail })
    });
    var data = await res.json();
    if (data.success) {
      markDeletedUI(ctxMsgEl, true);
      // Notify others via socket
      socket.emit('delete-message', {
        msgId: ctxMsgId,
        deletedFor: 'everyone',
        to: currentChat || null,
        groupId: currentGroup ? currentGroup.id : null
      });
    } else {
      alert('Could not delete: ' + (data.message || ''));
    }
  } catch(e) { alert('Error: ' + e.message); }
}

function markDeletedUI(el, everyone) {
  // Replace bubble content, keep time row, remove context menu listener
  var timeEl = el.querySelector('.msg-time');
  var timeHtml = timeEl ? timeEl.outerHTML : '';
  var senderEl = el.querySelector('.sender-name');
  var senderHtml = senderEl ? senderEl.outerHTML : '';
  el.innerHTML = senderHtml + '<div class="deleted-bubble">🚫 This message was deleted</div>' + timeHtml;
  el.replaceWith(el.cloneNode(true)); // remove all event listeners
}

// ─────────────────────────────────────────
//  SEND MESSAGE
// ─────────────────────────────────────────
function sendMsg() {
  var input = document.getElementById('msg-input');
  var text  = input.value.trim();
  if (!text) return;
  var now = new Date().toISOString();
  if (currentGroup) {
    socket.emit('group-message', { groupId: currentGroup.id, from: myEmail, message: text, type: 'text' });
  } else if (currentChat) {
    socket.emit('private-message', { to: currentChat, from: myEmail, message: text, type: 'text' });
    socket.emit('stop-typing', { to: currentChat, from: myEmail });
  }
  input.value = '';
  input.style.height = 'auto';
}

// Optimistic local append after server saves (via socket echo)
socket.on('private-message-echo', function(data) {
  if (data.from === myEmail) {
    appendBubble(data.id, data.message, 'me', data.time, data.type, data.fileUrl, data.fileName);
  }
});
socket.on('group-message-echo', function(data) {
  if (data.from === myEmail && currentGroup && currentGroup.id === data.groupId) {
    appendGroupBubble(data.id, data.from, data.message, 'me', data.time, data.type, data.fileUrl, data.fileName);
  }
});

document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  if (!currentChat) return;
  socket.emit('typing', { to: currentChat, from: myEmail });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(function() {
    socket.emit('stop-typing', { to: currentChat, from: myEmail });
  }, 1500);
});

// ── Generic file upload helper ──
async function uploadAndSend(file) {
  if (!file || (!currentChat && !currentGroup)) return;
  var formData = new FormData();
  formData.append('file', file);
  try {
    var res  = await fetch(SERVER + '/upload', { method: 'POST', body: formData });
    var data = await res.json();
    if (data.success) {
      if (currentGroup) {
        socket.emit('group-message', { groupId: currentGroup.id, from: myEmail, message: '', type: data.type, fileUrl: data.fileUrl, fileName: data.fileName });
      } else {
        socket.emit('private-message', { to: currentChat, from: myEmail, message: '', type: data.type, fileUrl: data.fileUrl, fileName: data.fileName });
      }
    } else { alert('Upload failed!'); }
  } catch(e) { alert('Upload failed!'); }
}

// Hook all file inputs to the same handler
['file-input','img-file-input','video-file-input','doc-file-input'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', async function() {
    await uploadAndSend(this.files[0]);
    this.value = '';
  });
});

// ── Attachment menu ──
function toggleAttachMenu(e) {
  e.stopPropagation();
  document.getElementById('attach-menu').classList.toggle('show');
}
function triggerFile(inputId) {
  document.getElementById('attach-menu').classList.remove('show');
  document.getElementById(inputId).click();
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('#attach-btn') && !e.target.closest('#attach-menu')) {
    document.getElementById('attach-menu').classList.remove('show');
  }
});

// ═══════════════════════════════════════════════
//  VOICE RECORDING  (Press & Hold 🎤)
// ═══════════════════════════════════════════════
var mediaRecorder   = null;
var audioChunks     = [];
var recTimerInterval = null;
var recSeconds      = 0;
var audioCtx        = null;
var analyser        = null;
var animFrameId     = null;
var recStream       = null;

function startRecording(e) {
  if (e) e.preventDefault();
  if (!currentChat && !currentGroup) return;
  if (mediaRecorder && mediaRecorder.state === 'recording') return;

  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    recStream   = stream;
    audioChunks = [];
    recSeconds  = 0;

    // UI switch
    document.getElementById('msg-input').style.display = 'none';
    document.getElementById('rec-bar').classList.add('show');
    document.getElementById('voice-btn').classList.add('recording');

    // Timer
    updateRecTimer();
    recTimerInterval = setInterval(function() {
      recSeconds++;
      updateRecTimer();
    }, 1000);

    // Waveform visualiser
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    drawWave();

    // MediaRecorder
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = function(ev) {
      if (ev.data.size > 0) audioChunks.push(ev.data);
    };
    mediaRecorder.onstop = function() {
      var blob = new Blob(audioChunks, { type: 'audio/webm' });
      if (recSeconds >= 1) {
        sendVoiceMessage(blob);
      }
      cleanupRecording();
    };
    mediaRecorder.start();
  }).catch(function(err) {
    alert('Microphone access denied: ' + err.message);
  });
}

function stopRecording() {
  if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
  mediaRecorder.stop();
}

function cancelRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.ondataavailable = null;
    mediaRecorder.onstop = null;
    mediaRecorder.stop();
  }
  cleanupRecording();
}

function cleanupRecording() {
  clearInterval(recTimerInterval);
  if (animFrameId) cancelAnimationFrame(animFrameId);
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (recStream) { recStream.getTracks().forEach(function(t) { t.stop(); }); recStream = null; }
  document.getElementById('msg-input').style.display = '';
  document.getElementById('rec-bar').classList.remove('show');
  document.getElementById('voice-btn').classList.remove('recording');
  document.getElementById('rec-timer').textContent = '0:00';
  // Clear canvas
  var canvas = document.getElementById('rec-wave');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function updateRecTimer() {
  var m = Math.floor(recSeconds / 60);
  var s = recSeconds % 60;
  document.getElementById('rec-timer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
}

function drawWave() {
  var canvas  = document.getElementById('rec-wave');
  var ctx     = canvas.getContext('2d');
  var bufLen  = analyser.frequencyBinCount;
  var dataArr = new Uint8Array(bufLen);

  function frame() {
    animFrameId = requestAnimationFrame(frame);
    analyser.getByteFrequencyData(dataArr);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var barW = (canvas.width / bufLen) * 2;
    var x = 0;
    for (var i = 0; i < bufLen; i++) {
      var barH = (dataArr[i] / 255) * canvas.height;
      ctx.fillStyle = 'rgba(239,68,68,' + (0.4 + (dataArr[i] / 255) * 0.6) + ')';
      ctx.fillRect(x, canvas.height - barH, barW - 1, barH);
      x += barW;
    }
  }
  frame();
}

async function sendVoiceMessage(blob) {
  var file     = new File([blob], 'voice-' + Date.now() + '.webm', { type: 'audio/webm' });
  var formData = new FormData();
  formData.append('file', file);
  try {
    var res  = await fetch(SERVER + '/upload', { method: 'POST', body: formData });
    var data = await res.json();
    if (data.success) {
      var payload = { message: '', type: 'audio', fileUrl: data.fileUrl, fileName: data.fileName };
      if (currentGroup) {
        socket.emit('group-message', Object.assign({ groupId: currentGroup.id, from: myEmail }, payload));
      } else {
        socket.emit('private-message', Object.assign({ to: currentChat, from: myEmail }, payload));
      }
    } else { alert('Voice upload failed!'); }
  } catch(e) { alert('Voice upload error: ' + e.message); }
}

// ─── Group functions ───
function openCreateGroup() {
  var list = document.getElementById('members-checklist');
  list.innerHTML = '';
  allUsers.forEach(function(email) {
    var div = document.createElement('label');
    div.className = 'member-check';
    var cb = document.createElement('input');
    cb.type = 'checkbox'; cb.value = email;
    div.appendChild(cb);
    div.appendChild(document.createTextNode(' ' + getDisplayName(email)));
    list.appendChild(div);
  });
  document.getElementById('group-modal').classList.add('show');
}

function closeCreateGroup() {
  document.getElementById('group-modal').classList.remove('show');
  document.getElementById('group-name-input').value = '';
}

async function createGroup() {
  var name = document.getElementById('group-name-input').value.trim();
  if (!name) { alert('Name is required!'); return; }
  var checked = [];
  document.querySelectorAll('#members-checklist input:checked').forEach(function(i) { checked.push(i.value); });
  if (!checked.length) { alert('Select at least one member!'); return; }
  try {
    var res  = await fetch(SERVER + '/groups', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, members: checked, created_by: myEmail })
    });
    var data = await res.json();
    if (data.success) {
      closeCreateGroup();
      await loadGroups();
      var newGroup = myGroups.find(function(g) { return g.id === data.groupId; });
      if (newGroup) openGroupChat(newGroup);
    }
  } catch(e) { alert('Group create failed!'); }
}

function openGroupInfo() {
  var panel = document.getElementById('group-info-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  if (panel.style.display === 'block' && currentGroup) loadGroupMembers();
}

async function loadGroupMembers() {
  var res  = await fetch(SERVER + '/groups/' + currentGroup.id + '/members');
  var data = await res.json();
  var list = document.getElementById('group-members-list');
  list.innerHTML = '';
  if (data.success) {
    data.members.forEach(function(email) {
      var chip = document.createElement('div');
      chip.style.cssText = 'background:var(--card);border:1px solid var(--border);padding:4px 10px;border-radius:20px;font-size:12px;color:var(--text);';
      chip.textContent = email === myEmail ? getDisplayName(email) + ' (You)' : getDisplayName(email);
      list.appendChild(chip);
    });
  }
}

async function leaveGroup() {
  if (!confirm('Leave this group?')) return;
  var res  = await fetch(SERVER + '/groups/' + currentGroup.id + '/leave', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: myEmail })
  });
  var data = await res.json();
  if (data.success) {
    currentGroup = null;
    document.getElementById('chat-view').style.display   = 'none';
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('group-info-panel').style.display = 'none';
    await loadGroups();
  }
}

function openAddMembers() {
  document.getElementById('group-info-panel').style.display = 'none';
  var list = document.getElementById('add-members-checklist');
  list.innerHTML = '';
  allUsers.forEach(function(email) {
    var div = document.createElement('label');
    div.className = 'member-check';
    var cb = document.createElement('input');
    cb.type = 'checkbox'; cb.value = email;
    div.appendChild(cb);
    div.appendChild(document.createTextNode(' ' + getDisplayName(email)));
    list.appendChild(div);
  });
  document.getElementById('add-members-modal').classList.add('show');
}

async function addMembers() {
  var checked = [];
  document.querySelectorAll('#add-members-checklist input:checked').forEach(function(i) { checked.push(i.value); });
  if (!checked.length) { alert('Select members!'); return; }
  var res  = await fetch(SERVER + '/groups/' + currentGroup.id + '/members', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ members: checked })
  });
  var data = await res.json();
  if (data.success) {
    document.getElementById('add-members-modal').classList.remove('show');
    alert('Members added!');
  }
}

function showGroupActions(show) {
  document.getElementById('group-actions').style.display = show ? 'flex' : 'none';
  if (!show) document.getElementById('group-info-panel').style.display = 'none';
}

function logout() {
  localStorage.clear();
  window.location.href = 'index.html';
}

(async function init() {
  await loadProfiles();
  await loadUsers();
  await loadGroups();
})();
</script>
