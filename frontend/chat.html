<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YourApp — Chat</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #070b11;
  --surface:  #0e1521;
  --card:     #131d2e;
  --border:   #1e2d45;
  --text:     #e2eaf5;
  --muted:    #5a7394;
  --accent:   #3b82f6;
  --accent2:  #06d6a0;
  --online:   #06d6a0;
  --offline:  #374151;
  --me-msg:   #1d3e72;
  --them-msg: #131d2e;
  --danger:   #ef4444;
  --font:     'Plus Jakarta Sans', sans-serif;
  --mono:     'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
#topbar {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 10;
}
#topbar .logo {
  font-size: 17px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
#topbar .logo span { color: var(--text); }
#topbar-spacer { flex: 1; }
#topbar-user {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--muted);
}
#topbar-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; color: #fff;
}
#logout-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
}
#logout-btn:hover { border-color: var(--danger); color: var(--danger); }

/* ── MAIN LAYOUT ── */
#main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── LEFT PANEL — Dashboard ── */
#left-panel {
  width: 340px;
  min-width: 340px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#panel-header {
  padding: 20px 20px 12px;
  border-bottom: 1px solid var(--border);
}
#panel-header h2 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}
#panel-header p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
#search-wrap {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
#search-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 14px;
  color: var(--text);
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.2s;
}
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--muted); }

#tab-bar {
  display: flex;
  padding: 8px 16px 0;
  gap: 4px;
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font);
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.2s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

#users-scroll { flex: 1; overflow-y: auto; padding: 8px; }
#users-scroll::-webkit-scrollbar { width: 4px; }
#users-scroll::-webkit-scrollbar-track { background: transparent; }
#users-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* User Card */
.user-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  margin-bottom: 2px;
}
.user-card:hover { background: var(--card); }
.user-card.active { background: #162038; }
.user-card.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 3px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}

.avatar-wrap { position: relative; flex-shrink: 0; }
.card-avatar {
  width: 44px; height: 44px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 17px; color: #fff;
}
.status-dot {
  position: absolute;
  bottom: -2px; right: -2px;
  width: 13px; height: 13px;
  border-radius: 50%;
  border: 2px solid var(--surface);
  background: var(--offline);
  transition: background 0.3s;
}
.status-dot.online { background: var(--online); }

.card-info { flex: 1; overflow: hidden; }
.card-name {
  font-size: 14px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-sub.online-text { color: var(--online); }

.unread-badge {
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 18px; height: 18px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 5px;
  display: none;
}

/* ── RIGHT PANEL — Chat ── */
#right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Empty state */
#empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--muted);
}
.empty-icon {
  width: 72px; height: 72px;
  background: var(--card);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  border: 1px solid var(--border);
}
#empty-state h3 { font-size: 17px; color: var(--text); }
#empty-state p { font-size: 13px; }

/* Chat view */
#chat-view {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

#chat-topbar {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 12px;
}
#ct-avatar {
  width: 38px; height: 38px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; color: #fff;
}
#ct-name { font-size: 15px; font-weight: 700; }
#ct-status { font-size: 12px; color: var(--muted); margin-top: 1px; }
#ct-status.online { color: var(--online); }

#messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
#messages-area::-webkit-scrollbar { width: 4px; }
#messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg-group {
  display: flex;
  flex-direction: column;
  max-width: 60%;
  gap: 2px;
}
.msg-group.me { align-self: flex-end; align-items: flex-end; }
.msg-group.them { align-self: flex-start; align-items: flex-start; }

.bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.55;
  word-break: break-word;
}
.me .bubble {
  background: var(--me-msg);
  border-bottom-right-radius: 4px;
  color: #c8ddff;
}
.them .bubble {
  background: var(--them-msg);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
  color: var(--text);
}
.msg-time {
  font-size: 10px;
  color: var(--muted);
  font-family: var(--mono);
  margin: 0 4px;
}

.day-label {
  align-self: center;
  font-size: 11px;
  color: var(--muted);
  background: var(--card);
  border: 1px solid var(--border);
  padding: 3px 12px;
  border-radius: 20px;
  margin: 12px 0;
  font-family: var(--mono);
}

.no-msgs {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: var(--muted);
  font-size: 13px;
}

/* Input area */
#input-row {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: flex-end;
  gap: 12px;
}
#msg-input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 11px 16px;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  outline: none;
  resize: none;
  max-height: 120px;
  transition: border-color 0.2s;
  line-height: 1.5;
}
#msg-input:focus { border-color: var(--accent); }
#msg-input::placeholder { color: var(--muted); }
#send-btn {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
#send-btn:hover { background: #2563eb; transform: scale(1.05); }
#send-btn svg { width: 18px; height: 18px; fill: #fff; }

/* ── LOGIN WALL ── */
#login-wall {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
  flex-direction: column;
  gap: 20px;
}
#login-wall .icon { font-size: 52px; }
#login-wall h2 { font-size: 22px; font-weight: 700; }
#login-wall p { color: var(--muted); font-size: 14px; }
#login-wall a {
  padding: 12px 28px;
  background: var(--accent);
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 700;
  font-size: 15px;
  transition: background 0.2s;
}
#login-wall a:hover { background: #2563eb; }

/* Avatar colors */
.av0  { background: linear-gradient(135deg,#3b82f6,#8b5cf6); }
.av1  { background: linear-gradient(135deg,#06d6a0,#3b82f6); }
.av2  { background: linear-gradient(135deg,#f59e0b,#ef4444); }
.av3  { background: linear-gradient(135deg,#ec4899,#8b5cf6); }
.av4  { background: linear-gradient(135deg,#10b981,#06d6a0); }
.av5  { background: linear-gradient(135deg,#f97316,#f59e0b); }
.av6  { background: linear-gradient(135deg,#6366f1,#3b82f6); }
.av7  { background: linear-gradient(135deg,#14b8a6,#3b82f6); }
</style>
</head>
<body>

<!-- LOGIN WALL -->
<div id="login-wall" style="display:none;">
  <div class="icon">🔐</div>
  <h2>Login பண்ணணும்!</h2>
  <p>Chat பண்ண முதல்ல login பண்ணு</p>
  <a href="index.html">← Login Page</a>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">💬 <span>YourApp</span></div>
  <div id="topbar-spacer"></div>
  <div id="topbar-user">
    <div id="topbar-avatar">?</div>
    <span id="topbar-email">-</span>
    <button id="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT: User List -->
  <div id="left-panel">
    <div id="panel-header">
      <h2>Messages</h2>
      <p id="online-count">Loading users...</p>
    </div>
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="🔍  Search by email..."/>
    </div>
    <div id="tab-bar">
      <button class="tab-btn active" onclick="setTab('all',this)">All</button>
      <button class="tab-btn" onclick="setTab('online',this)">Online</button>
    </div>
    <div id="users-scroll"></div>
  </div>

  <!-- RIGHT: Chat -->
  <div id="right-panel">

    <!-- Empty state -->
    <div id="empty-state">
      <div class="empty-icon">💬</div>
      <h3>யாரோட பேசணும்?</h3>
      <p>Left side-ல ஒரு user select பண்ணு</p>
    </div>

    <!-- Chat view -->
    <div id="chat-view">
      <div id="chat-topbar">
        <div id="ct-avatar" class="av0">?</div>
        <div>
          <div id="ct-name">-</div>
          <div id="ct-status">-</div>
        </div>
      </div>
      <div id="messages-area"></div>
      <div id="input-row">
        <textarea id="msg-input" rows="1" placeholder="Type a message... (Enter to send)"></textarea>
        <button id="send-btn">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
const SERVER   = "http://localhost:5000";
const token    = localStorage.getItem("token");
const myEmail  = localStorage.getItem("email");

// Auth check
if (!token || !myEmail) {
  document.getElementById("login-wall").style.display = "flex";
}

// My info in topbar
document.getElementById("topbar-avatar").textContent = myEmail ? myEmail[0].toUpperCase() : "?";
document.getElementById("topbar-email").textContent  = myEmail || "";

// Socket
const socket = io("http://localhost:5000", {
  transports: ["websocket", "polling"]
});
socket.emit("join", myEmail);

let onlineList   = [];
let allUsers     = [];
let currentChat  = null;
let activeTab    = "all";
let lastSeenMap  = {}; // email -> last seen time string
let unreadMap    = {}; // email -> count

// Avatar color by index
function avClass(email) {
  const colors = ['av0','av1','av2','av3','av4','av5','av6','av7'];
  let h = 0; for (let c of email) h = (h * 31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}

// Format last seen
function formatLastSeen(isoStr) {
  if (!isoStr) return "Last seen: unknown";
  const d = new Date(isoStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60)  return `Last seen just now`;
  if (diff < 3600) return `Last seen ${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `Last seen ${Math.floor(diff/3600)}h ago`;
  return `Last seen ${d.toLocaleDateString()}`;
}

// ── Socket Events ──
socket.on("online-users", (list) => {
  onlineList = list;
  renderUsers();
  if (currentChat) updateChatHeader();
});

socket.on("user-last-seen", ({ email, time }) => {
  lastSeenMap[email] = time;
  renderUsers();
  if (currentChat === email) updateChatHeader();
});

socket.on("private-message", ({ from, message, time }) => {
  if (currentChat === from) {
    appendBubble(message, "them", time);
  } else {
    unreadMap[from] = (unreadMap[from] || 0) + 1;
    renderUsers();
  }
});

socket.on("private-message-sent", ({ to, message, time }) => {
  if (currentChat === to) {
    appendBubble(message, "me", time);
  }
});

// ── Load all users ──
async function loadUsers() {
  const res  = await fetch(`${SERVER}/users`, { headers: { authorization: token } });
  const data = await res.json();
  if (data.success) {
    allUsers = data.users.filter(u => u !== myEmail);
    renderUsers();
  }
}

// ── Render Users ──
function renderUsers(filter = "") {
  const scroll = document.getElementById("users-scroll");
  const q      = document.getElementById("search-input").value.toLowerCase();
  filter = q || filter;

  let list = allUsers.filter(u => u.toLowerCase().includes(filter));
  if (activeTab === "online") list = list.filter(u => onlineList.includes(u));

  const onlineCnt = allUsers.filter(u => onlineList.includes(u)).length;
  document.getElementById("online-count").textContent =
    `${allUsers.length} users · ${onlineCnt} online now`;

  scroll.innerHTML = "";

  if (list.length === 0) {
    scroll.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:13px;padding:30px;">No users found</div>`;
    return;
  }

  list.forEach((email, i) => {
    const isOnline = onlineList.includes(email);
    const initial  = email[0].toUpperCase();
    const av       = avClass(email);
    const unread   = unreadMap[email] || 0;
    const sub      = isOnline ? "Online now" : formatLastSeen(lastSeenMap[email]);

    const card = document.createElement("div");
    card.className = `user-card${currentChat === email ? " active" : ""}`;
    card.dataset.email = email;
    card.innerHTML = `
      <div class="avatar-wrap">
        <div class="card-avatar ${av}">${initial}</div>
        <div class="status-dot ${isOnline ? "online" : ""}"></div>
      </div>
      <div class="card-info">
        <div class="card-name">${email}</div>
        <div class="card-sub ${isOnline ? "online-text" : ""}">${isOnline ? "🟢 " : ""}${sub}</div>
      </div>
      <div class="unread-badge" style="${unread > 0 ? "display:flex" : "display:none"}">${unread}</div>
    `;
    card.onclick = () => openChat(email);
    scroll.appendChild(card);
  });
}

// ── Tab ──
function setTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderUsers();
}

// ── Search ──
document.getElementById("search-input").oninput = () => renderUsers();

// ── Open Chat ──
async function openChat(email) {
  currentChat = email;
  unreadMap[email] = 0;
  renderUsers();

  document.getElementById("empty-state").style.display = "none";
  const cv = document.getElementById("chat-view");
  cv.style.display = "flex";

  updateChatHeader();

  // Load history
  const res  = await fetch(
    `${SERVER}/messages/${encodeURIComponent(myEmail)}/${encodeURIComponent(email)}`,
    { headers: { authorization: token } }
  );
  const data = await res.json();
  const area = document.getElementById("messages-area");
  area.innerHTML = "";

  if (data.success && data.messages.length > 0) {
    let lastDay = "";
    data.messages.forEach(m => {
      const day = new Date(m.created_at).toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" });
      if (day !== lastDay) {
        const lbl = document.createElement("div");
        lbl.className = "day-label";
        lbl.textContent = day;
        area.appendChild(lbl);
        lastDay = day;
      }
      appendBubble(m.message, m.sender === myEmail ? "me" : "them", m.created_at);
    });
  } else {
    area.innerHTML = `<div class="no-msgs"><span style="font-size:32px">👋</span><span>Say hi to ${email.split("@")[0]}!</span></div>`;
  }
  scrollBottom();
}

function updateChatHeader() {
  const email    = currentChat;
  const isOnline = onlineList.includes(email);
  const av       = avClass(email);

  const ctAv = document.getElementById("ct-avatar");
  ctAv.textContent = email[0].toUpperCase();
  ctAv.className   = `av${av.replace("av","")}`;

  document.getElementById("ct-name").textContent = email;

  const statusEl = document.getElementById("ct-status");
  if (isOnline) {
    statusEl.textContent = "🟢 Online now";
    statusEl.className   = "online";
  } else {
    statusEl.textContent = formatLastSeen(lastSeenMap[email]);
    statusEl.className   = "";
  }
}

// ── Append bubble ──
function appendBubble(text, who, time) {
  const area = document.getElementById("messages-area");
  const noMsg = area.querySelector(".no-msgs");
  if (noMsg) noMsg.remove();

  const group = document.createElement("div");
  group.className = `msg-group ${who}`;
  const t = time ? new Date(time).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }) : "";
  group.innerHTML = `
    <div class="bubble">${escHtml(text)}</div>
    <div class="msg-time">${t}</div>
  `;
  area.appendChild(group);
  scrollBottom();
}

function scrollBottom() {
  const a = document.getElementById("messages-area");
  a.scrollTop = a.scrollHeight;
}

function escHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Send ──
function sendMsg() {
  const input = document.getElementById("msg-input");
  const text  = input.value.trim();
  if (!text || !currentChat) return;
  socket.emit("private-message", { to: currentChat, from: myEmail, message: text });
  input.value = "";
  input.style.height = "auto";
}

document.getElementById("send-btn").onclick = sendMsg;
document.getElementById("msg-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
document.getElementById("msg-input").oninput = function () {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
};

// ── Logout ──
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

// ── Init ──
loadUsers();
</script>
</body>
</html>
